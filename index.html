// =============================================================
// API helper — attaches the Supabase JWT to every request.
// =============================================================
async function api(path, opts = {}) {
  const { data: { session } } = await window.sb.auth.getSession();
  if (!session) throw new Error('Not logged in');
  const res = await fetch(API_BASE + path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + session.access_token,
      ...(opts.headers || {}),
    },
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`API ${res.status}: ${text}`);
  }
  return res.json();
}

// =============================================================
// COACHING ENGINE (still rule-based; Day 3 swaps to LLM)
// =============================================================
function generateCoaching(stats, goal) {
  const eaten = stats.calories;
  const burned = stats.exerciseCalories;
  const net = eaten - burned;
  const diff = net - goal;
  let status, verdict, color;

  if (eaten === 0 && burned === 0) {
    status = "Nothing logged yet";
    verdict = "Start by adding your meals and any exercise.";
    color = "neutral";
  } else if (diff <= -100) {
    status = `Under target by ${Math.abs(diff)} kcal`;
    verdict = "Great — this deficit supports your weight-loss goal.";
    color = "good";
  } else if (diff < 100) {
    status = `On target (${diff >= 0 ? '+' : ''}${diff} kcal)`;
    verdict = "Right on plan — consistency like this builds results.";
    color = "good";
  } else if (diff < 300) {
    status = `Over target by ${diff} kcal`;
    verdict = "Slightly over — a short walk or smaller dinner tomorrow can balance it.";
    color = "warn";
  } else {
    status = `Over target by ${diff} kcal`;
    verdict = "Significantly over — try a 30-min walk and lighter portions tomorrow.";
    color = "bad";
  }
  return { eaten, burned, net, goal, diff, status, verdict, color };
}

function AuthScreen({ onAuth }) {
  const [mode, setMode] = useState('login');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [err, setErr] = useState(null);
  const [loading, setLoading] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setErr(null); setLoading(true);
    try {
      const fn = mode === 'login'
        ? window.sb.auth.signInWithPassword({ email, password })
        : window.sb.auth.signUp({ email, password });
      const { data, error } = await fn;
      if (error) throw error;
      if (data.session) onAuth(data.session);
      else setErr("Check your email to confirm sign-up.");
    } catch (e) { setErr(e.message); }
    finally { setLoading(false); }
  };

  return (
    <div className="max-w-md mx-auto p-6 mt-12">
      <div className="bg-white rounded-2xl shadow-lg p-8 fade-in">
        <div className="text-center mb-6">

            className={`flex-1 py-2 rounded-full text-sm font-medium ${mode==='login' ? 'bg-white shadow text-purple-700' : 'text-gray-500'}`}
            onClick={() => setMode('login')}>Log in</button>
          <button
            className={`flex-1 py-2 rounded-full text-sm font-medium ${mode==='signup' ? 'bg-white shadow text-purple-700' : 'text-gray-500'}`}
            onClick={() => setMode('signup')}>Sign up</button>
        </div>

        <form onSubmit={submit} className="space-y-3">
          <input type="email" placeholder="Email" required
            value={email} onChange={e => setEmail(e.target.value)}
            className="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-purple-400" />
          <input type="password" placeholder="Password (min 6 chars)" required minLength={6}
            value={password} onChange={e => setPassword(e.target.value)}
            className="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-purple-400" />
          {err && <div className="text-sm text-red-600 bg-red-50 p-2 rounded">{err}</div>}
          <button type="submit" disabled={loading} className="btn-primary w-full py-3 rounded-lg text-white font-semibold">
            {loading ? '…' : mode === 'login' ? 'Log in' : 'Create account'}

        </form>

    </div>
  );
}

function CalorieRing({ eaten, goal }) {
  const radius = 80;
  const circumference = 2 * Math.PI * radius;
  const progress = Math.min(eaten / goal, 1);
  const offset = circumference * (1 - progress);
  const left = Math.max(goal - eaten, 0);
  const over = eaten > goal;
  return (
    <div className="relative flex items-center justify-center">
      <svg width="200" height="200" className="transform -rotate-90">
        <circle cx="100" cy="100" r={radius} stroke="#ede9fe" strokeWidth="14" fill="none" />
        <circle cx="100" cy="100" r={radius} stroke={over ? "#ef4444" : "#7c3aed"} strokeWidth="14" fill="none"
          strokeLinecap="round" strokeDasharray={circumference} strokeDashoffset={offset} className="ring-progress" />
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <div className="text-xs text-gray-500 uppercase tracking-wider">{over ? "Over by" : "Left"}</div>
        <div className={`text-4xl font-bold ${over ? "text-red-500" : "text-purple-700"}`}>{over ? eaten - goal : left}</div>
        <div className="text-xs text-gray-500">kcal</div>
        <div className="text-xs text-gray-400 mt-1">{eaten} / {goal}</div>
      </div>
    </div>
  );
}

function MacroBar({ label, value, goal, color }) {
  const pct = Math.min((value / goal) * 100, 100);
  return (
    <div className="flex-1">
      <div className="flex justify-between text-xs mb-1">
        <span className="text-gray-600 font-medium">{label}</span>
        <span className="text-gray-500">{Math.round(value)}g / {goal}g</span>
      </div>
      <div className="h-2 bg-gray-100 rounded-full overflow-hidden">
        <div className={`h-full macro-bar-fill ${color}`} style={{ width: `${pct}%` }} />
      </div>
    </div>
  );
}

function AddMealModal({ section, onClose, onAdd }) {

  const [results, setResults] = useState([]);
  const [searching, setSearching] = useState(false);

  // Day 5: semantic search with 300ms debounce so we don't burn API calls on every keystroke.
  useEffect(() => {
  const id = setTimeout(async () => {
    if (search.trim().length < 2) { setResults([]); return; }
    if (searching) return;   // ← skip if previous request still running
    setSearching(true);
    try {
      const data = await api(`/search-food?q=${encodeURIComponent(search.trim())}`);
      setResults(data);
    } catch (e) { console.error('search failed', e); setResults([]); }
    finally { setSearching(false); }
  }, 600);   // ← increased from 300 to 600
  return () => clearTimeout(id);
}, [search]);

  const filtered = search.trim().length < 2 ? [] : results;

  const submitCustom = () => {
    if (!custom.name || !custom.calories) return;
    onAdd({ name: custom.name, calories: Number(custom.calories)||0, carbs: Number(custom.carbs)||0, protein: Number(custom.protein)||0, fat: Number(custom.fat)||0 });
    onClose();

    <div className="fixed inset-0 bg-black bg-opacity-40 flex items-end sm:items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl w-full max-w-md max-h-[80vh] flex flex-col fade-in" onClick={e => e.stopPropagation()}>

        </div>
        {!customMode ? (
          <div className="flex-1 overflow-y-auto p-5">
            <input type="text" placeholder="Try 'chapati', 'high protein', 'spicy curry'..." value={search} onChange={e => setSearch(e.target.value)}

              {searching ? '🔍 searching by meaning…' : (results.length > 0 ? `${results.length} semantic match${results.length===1?'':'es'}` : 'Type 2+ chars for AI-powered search')}
            </div>
            <div className="space-y-2">
              {filtered.map((f, i) => (
                <button key={i} onClick={() => { onAdd(f); onClose(); }}
                  className="w-full text-left p-3 rounded-lg hover:bg-purple-50 border border-gray-100 flex justify-between items-center">
                  <div>
                    <div className="font-medium text-gray-800 text-sm">{f.name}</div>

        </div>
        <button onClick={onAdd} className="w-7 h-7 rounded-full text-white flex items-center justify-center text-base font-light shrink-0"
          style={{ background: 'linear-gradient(135deg,#f97316,#fb923c)' }}>+</button>
      </div>
      {items.length > 0 && (
        <div className="mt-1.5 space-y-0.5">
          {items.map(item => (
            <div key={item.id} className="flex justify-between items-center text-xs px-1.5 py-1 rounded hover:bg-orange-50 group">
              <div className="flex-1 truncate text-gray-700">{item.name}</div>
              <div className="text-orange-600 font-medium mx-1.5">-{item.calories}</div>
              <button onClick={() => onRemove(item.id)} className="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-red-500 text-xs">✕</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function DailySummary({ stats, goal }) {
  const coach = useMemo(() => generateCoaching(stats, goal), [stats, goal]);
  const gradients = {
    good: 'from-emerald-500 to-green-600',
    warn: 'from-amber-500 to-orange-500',
    bad: 'from-rose-500 to-red-600',
    neutral: 'from-purple-600 to-violet-700',
  };
  const bg = gradients[coach.color] || gradients.neutral;
  return (
    <div className={`bg-gradient-to-br ${bg} text-white rounded-2xl p-5 shadow-lg h-full flex flex-col`}>
      <div className="flex items-center gap-2 mb-4">
        <span className="text-2xl">🎯</span>
        <h3 className="font-bold text-lg">Daily Summary</h3>
      </div>
      <div className="grid grid-cols-3 gap-2 mb-4">
        <div className="bg-white bg-opacity-15 rounded-xl p-3 text-center">
          <div className="text-[10px] opacity-80 uppercase tracking-wider">Target</div>
          <div className="text-2xl font-bold">{coach.goal}</div>
        </div>
        <div className="bg-white bg-opacity-15 rounded-xl p-3 text-center">
          <div className="text-[10px] opacity-80 uppercase tracking-wider">Eaten</div>
          <div className="text-2xl font-bold">{coach.eaten}</div>
          <div className="text-[10px] opacity-70">-{coach.burned} burned</div>
        </div>
        <div className="bg-white bg-opacity-15 rounded-xl p-3 text-center">
          <div className="text-[10px] opacity-80 uppercase tracking-wider">Net</div>
          <div className="text-2xl font-bold">{coach.net}</div>
        </div>
      </div>
      <div className="bg-white bg-opacity-15 rounded-xl p-4 flex-1 flex flex-col justify-center">
        <div className="font-bold text-lg mb-1">{coach.status}</div>
        <div className="text-sm opacity-95">{coach.verdict}</div>
      </div>
    </div>
  );
}

// =============================================================
// AI COACH TAB — separate full-width strip at the bottom
// =============================================================
function AICoachTab({ coachData, coachLoading, onRefresh }) {
  return (
    <div className="glass rounded-2xl p-4 shadow-lg">
      <div className="flex items-center gap-3">
        <div className="flex items-center gap-2 shrink-0">
          <span className="text-2xl">🤖</span>
          <div>
            <div className="font-bold text-gray-800 text-base leading-tight">AI Coach</div>
            <div className="text-[10px] text-gray-500">Powered by Claude</div>
          </div>
        </div>

        <div className="flex-1 px-4">
          {coachLoading ? (
            <div className="text-sm text-purple-600 italic">Analyzing your day…</div>
          ) : coachData?.advice ? (
            <div className="flex items-center gap-4">
              <div className="flex-1">
                <div className="text-xs uppercase tracking-wider text-purple-600 font-semibold">{coachData.advice.status}</div>
                <div className="text-sm text-gray-700 mt-0.5">{coachData.advice.verdict}</div>
              </div>
              <div className="flex-1 border-l border-purple-200 pl-4">
                <div className="text-xs uppercase tracking-wider text-orange-600 font-semibold">💡 Tomorrow</div>
                <div className="text-sm text-gray-700 mt-0.5">{coachData.advice.tip}</div>
              </div>
            </div>
          ) : (
            <div className="text-sm text-gray-500 italic">Log your meals, then ask the AI for personalised coaching.</div>
          )}
        </div>

        <button onClick={onRefresh} disabled={coachLoading}
          className="btn-primary text-white px-5 py-2.5 rounded-full text-sm font-semibold shrink-0 disabled:opacity-50">
          {coachLoading ? 'Thinking…' : coachData ? 'Refresh' : 'Get coaching'}
        </button>
      </div>

      {coachData?.advice && (
        <div className="text-[10px] text-gray-400 mt-2 text-center">
          {coachData.model} · {coachData.usage.input_tokens}→{coachData.usage.output_tokens} tokens · severity: {coachData.advice.severity}
        </div>
      )}
    </div>
  );
}

// =============================================================
// MAIN APP — now backed by FastAPI + Supabase
// =============================================================
function App() {
  const [session, setSession] = useState(null);
  const [sbReady, setSbReady] = useState(!!window.sb);
  const [loading, setLoading] = useState(true);
  const [goal, setGoal] = useState(1800);
  const [meals, setMeals] = useState({ breakfast: [], lunch: [], dinner: [], snacks: [] });
  const [exercises, setExercises] = useState([]);
  const [modalSection, setModalSection] = useState(null);
  const [exerciseModalOpen, setExerciseModalOpen] = useState(false);
  const [quote] = useState(QUOTES[Math.floor(Math.random() * QUOTES.length)]);
  const [editingGoal, setEditingGoal] = useState(false);
  const [coachData, setCoachData] = useState(null);
  const [coachLoading, setCoachLoading] = useState(false);

  // ---- Wait for Supabase client to load ----
  useEffect(() => {
    if (window.sb) { setSbReady(true); return; }
    const handler = () => setSbReady(true);
    window.addEventListener('sb-ready', handler);
    return () => window.removeEventListener('sb-ready', handler);
  }, []);

  // ---- Check session on mount, subscribe to changes ----
  useEffect(() => {
    if (!sbReady) return;
    window.sb.auth.getSession().then(({ data }) => {
      setSession(data.session);
      setLoading(false);
    });
    const { data: sub } = window.sb.auth.onAuthStateChange((_event, sess) => setSession(sess));
    return () => sub.subscription.unsubscribe();
  }, [sbReady]);

  // ---- Load today's data from API when session appears ----
  const reload = async () => {
    if (!session) return;
    try {
      const day = todayKey();
      const [m, e] = await Promise.all([
        api(`/meals?day=${day}`),
        api(`/exercises?day=${day}`),
      ]);
      const grouped = { breakfast: [], lunch: [], dinner: [], snacks: [] };
      m.forEach(row => grouped[row.section]?.push(row));
      setMeals(grouped);
      setExercises(e);
    } catch (err) { console.error(err); }
  };
  useEffect(() => { if (session) reload(); }, [session]);

  const addMeal = async (section, item) => {
    await api('/meals', { method: 'POST', body: JSON.stringify({ section, ...item }) });
    reload();
  };
  const removeMeal = async (id) => {
    await api(`/meals/${id}`, { method: 'DELETE' });
    reload();
  };
  const addExercise = async (item) => {
    await api('/exercises', { method: 'POST', body: JSON.stringify(item) });
    reload();
  };
  const removeExercise = async (id) => {
    await api(`/exercises/${id}`, { method: 'DELETE' });
    reload();
  };

  // ---- Day 3: call the Claude-powered coach ----
  const fetchCoach = async () => {
    setCoachLoading(true);
    try {
      const meal_summary = Object.entries(meals)
        .filter(([_, items]) => items.length)
        .map(([sec, items]) => `${sec}: ${items.map(i => i.name).join(', ')}`)
        .join('; ');
      const data = await api('/coach', {
        method: 'POST',
        body: JSON.stringify({
          goal,
          eaten: stats.calories,
          burned: stats.exerciseCalories,
          protein: stats.protein,
          carbs: stats.carbs,
          fat: stats.fat,
          meal_summary,
        }),
      });
      setCoachData(data);
    } catch (e) { console.error(e); alert('Coach unavailable: ' + e.message); }
    finally { setCoachLoading(false); }
  };

  const stats = useMemo(() => {
    const all = [...meals.breakfast, ...meals.lunch, ...meals.dinner, ...meals.snacks];
    return {
      calories: all.reduce((s,i) => s + Number(i.calories), 0),
      carbs:    all.reduce((s,i) => s + Number(i.carbs || 0), 0),
      protein:  all.reduce((s,i) => s + Number(i.protein || 0), 0),
      fat:      all.reduce((s,i) => s + Number(i.fat || 0), 0),
      exerciseCalories: exercises.reduce((s,i) => s + Number(i.calories), 0),
    };
  }, [meals, exercises]);

  const macroGoals = {
    protein: Math.round(goal * 0.30 / 4),
    carbs:   Math.round(goal * 0.45 / 4),
    fat:     Math.round(goal * 0.25 / 9),
  };
  const today = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });

  // ---- Render gates ----
  if (loading) return <div className="text-center mt-20 text-purple-600">Loading…</div>;
  if (!session) return <AuthScreen onAuth={setSession} />;

  // ---- Authenticated app ----
  return (
    <div className="min-h-screen w-full p-3 flex flex-col">
      {/* TOP BAR */}
      <div className="w-full flex justify-between items-center mb-3 shrink-0 fade-in">
        <div className="flex items-baseline gap-3">
          <div className="text-xl font-extrabold text-white tracking-tight">FitTrack</div>
          <div className="text-xs text-white/70">{today}</div>
        </div>
        <div className="flex items-center gap-3">
          <div className="text-xs text-white/80">{session.user.email}</div>
          <button onClick={() => window.sb.auth.signOut()}
            className="text-xs text-white/80 hover:text-white px-3 py-1 rounded-full glass-dark">
            Log out
          </button>
        </div>
      </div>

      {/* MAIN 3-COLUMN GRID — fills remaining vertical space */}
      <div className="w-full grid grid-cols-1 lg:grid-cols-12 gap-3 fade-in flex-1 min-h-0">

        {/* LEFT — Calorie ring + macros + quote */}
        <div className="lg:col-span-4 flex flex-col gap-3 min-h-0">
          <div className="glass rounded-2xl p-5 shadow-lg flex-1 flex flex-col justify-center">
            <div className="flex items-center gap-4">
              <div className="shrink-0">
                <CalorieRing eaten={Math.max(stats.calories - stats.exerciseCalories, 0)} goal={goal} />
              </div>
              <div className="flex-1 space-y-3">
                <div className="flex justify-between items-center">
                  <span className="text-[11px] text-gray-500 uppercase tracking-wider">Daily goal</span>
                  {editingGoal ? (
                    <input type="number" value={goal} autoFocus
                      onChange={e => setGoal(Number(e.target.value) || 1800)}
                      onBlur={() => setEditingGoal(false)}
                      className="w-20 px-2 py-0.5 border border-purple-300 rounded text-right text-xs" />
                  ) : (
                    <button onClick={() => setEditingGoal(true)} className="text-xs font-bold text-purple-700">{goal} kcal ✏️</button>
                  )}
                </div>
                <MacroBar label="Carbs"   value={stats.carbs}   goal={macroGoals.carbs}   color="bg-blue-400" />
                <MacroBar label="Protein" value={stats.protein} goal={macroGoals.protein} color="bg-emerald-400" />
                <MacroBar label="Fat"     value={stats.fat}     goal={macroGoals.fat}     color="bg-amber-400" />
              </div>
            </div>
          </div>

          <div className="glass rounded-2xl p-4 shadow-lg shrink-0">
            <div className="text-[10px] text-purple-500 uppercase tracking-wider mb-0.5">Daily motivation</div>
            <div className="font-medium quote-shimmer text-sm leading-snug">"{quote}"</div>
          </div>
        </div>

        {/* MIDDLE — Meals + exercise (stretch to fill column) */}
        <div className="lg:col-span-4 flex flex-col gap-2 min-h-0">
          <MealSection name="breakfast" icon="🍳" items={meals.breakfast} onAdd={() => setModalSection('breakfast')} onRemove={removeMeal} />
          <MealSection name="lunch"     icon="🥗" items={meals.lunch}     onAdd={() => setModalSection('lunch')}     onRemove={removeMeal} />
          <MealSection name="dinner"    icon="🍛" items={meals.dinner}    onAdd={() => setModalSection('dinner')}    onRemove={removeMeal} />
          <MealSection name="snacks"    icon="🍎" items={meals.snacks}    onAdd={() => setModalSection('snacks')}    onRemove={removeMeal} />
          <ExerciseSection items={exercises} onAdd={() => setExerciseModalOpen(true)} onRemove={removeExercise} />
        </div>

        {/* RIGHT — Daily summary */}
        <div className="lg:col-span-4 flex flex-col min-h-0">
          <DailySummary stats={stats} goal={goal} />
        </div>

      </div>

      {/* BOTTOM — AI Coach tab spanning full width */}
      <div className="w-full mt-3 shrink-0 fade-in">
        <AICoachTab coachData={coachData} coachLoading={coachLoading} onRefresh={fetchCoach} />
      </div>

      {modalSection && (
        <AddMealModal section={modalSection} onClose={() => setModalSection(null)}
          onAdd={item => addMeal(modalSection, item)} />
      )}
      {exerciseModalOpen && (
        <AddExerciseModal onClose={() => setExerciseModalOpen(false)} onAdd={addExercise} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
